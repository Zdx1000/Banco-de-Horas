<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reimpressão - Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-red: #e63946;
            --dark-black: #212529;
            --neutral-gray: #adb5bd;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 0.25rem 0.875rem rgba(33, 37, 41, 0.15);
            --shadow-lg: 0 0.5rem 1.5rem rgba(33, 37, 41, 0.2);
            --border-radius: 0.75rem;
            --border-radius-lg: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark-black) 0%, var(--neutral-gray) 100%);
            min-height: 100vh;
            color: var(--dark-black);
            line-height: 1.6;
        }

        .header {
            background: var(--white);
            padding: 1rem;
            text-align: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary-red);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .stats-btn {
            background: var(--primary-red);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            min-height: 2.75rem;
            touch-action: manipulation;
        }

        .stats-btn:hover {
            transform: translateY(-0.125rem);
            box-shadow: var(--shadow-lg);
            background: #d62d39;
        }

        .stats-btn:active {
            transform: translateY(0);
        }

        .container {
            padding: 1rem;
            max-width: 100%;
        }

        .filters-container {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }

        .filter-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .filter-select {
            flex: 1;
            min-width: 8rem;
            padding: 0.875rem;
            border: 2px solid var(--light-gray);
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            background: var(--white);
            color: var(--dark-black);
            transition: all 0.3s ease;
            min-height: 2.75rem;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5rem 1.5rem;
            padding-right: 2.5rem;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .chart-container {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }

        .chart-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--dark-black);
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            height: 15.625rem;
        }

        .insights-container {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }

        .insights-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--dark-black);
            text-align: center;
        }

        .insight-item {
            background: var(--light-gray);
            padding: 0.875rem;
            border-radius: var(--border-radius);
            margin-bottom: 0.5rem;
            border-left: 4px solid var(--primary-red);
            font-size: 0.9rem;
        }

        .insight-item:last-child {
            margin-bottom: 0;
        }

        .loading {
            text-align: center;
            color: var(--white);
            font-size: 1.125rem;
            margin: 2rem 0;
            font-weight: 500;
        }

        .error {
            background: rgba(230, 57, 70, 0.1);
            color: var(--primary-red);
            padding: 1rem;
            border-radius: var(--border-radius);
            margin: 1rem;
            text-align: center;
            border: 1px solid rgba(230, 57, 70, 0.2);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(33, 37, 41, 0.75);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: block;
            opacity: 1;
        }

        .modal-content {
            background: var(--white);
            margin: 10% auto;
            padding: 1.5rem;
            border-radius: var(--border-radius-lg);
            width: 90%;
            max-width: 25rem;
            position: relative;
            transform: translateY(-1.25rem);
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        .close {
            position: absolute;
            right: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--neutral-gray);
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .close:hover {
            background: var(--light-gray);
            color: var(--dark-black);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-red);
            margin-bottom: 1rem;
            text-align: center;
            padding-right: 2rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--light-gray);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 500;
            color: var(--neutral-gray);
            font-size: 0.9rem;
        }

        .stat-value {
            font-weight: 700;
            color: var(--dark-black);
            font-size: 1.125rem;
        }

        /* Responsive Design */
        @media (min-width: 48rem) {
            .container {
                padding: 2rem;
                max-width: 75rem;
                margin: 0 auto;
            }

            .chart-wrapper {
                height: 18.75rem;
            }

            .filters-container {
                padding: 1.5rem;
            }

            .filter-row {
                justify-content: center;
                gap: 1rem;
            }

            .filter-select {
                max-width: 12.5rem;
            }

            .header h1 {
                font-size: 1.875rem;
            }
        }

        @media (min-width: 64rem) {
            .chart-wrapper {
                height: 21.875rem;
            }

            .modal-content {
                max-width: 31.25rem;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 0.5rem;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-gray);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neutral-gray);
            border-radius: 0.25rem;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-red);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Dashboard Reimpressão</h1>
        <button class="stats-btn" onclick="openModal()">Ver Estatísticas</button>
    </div>

    <div class="container">
        <div id="loading" class="loading">Carregando dados...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="main-content" style="display: none;">
            <div class="filters-container">
                <div class="filter-row">
                    <select id="funcionario-filter" class="filter-select">
                        <option value="">Todos os Funcionários</option>
                    </select>
                    <select id="mes-filter" class="filter-select">
                        <option value="">Todos os Meses</option>
                    </select>
                </div>
            </div>

            <div class="chart-container">
                <h3 class="chart-title">Reimpressões por Número da Semana</h3>
                <div class="chart-wrapper">
                    <canvas id="weekNumberChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h3 class="chart-title">Reimpressões por Dia da Semana</h3>
                <div class="chart-wrapper">
                    <canvas id="weekDayChart"></canvas>
                </div>
            </div>

            <div class="insights-container">
                <h3 class="insights-title">💡 Insights dos Dados</h3>
                <div id="insights-content"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title">📈 Estatísticas Gerais</h2>
            <div id="modal-stats"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.npoint.io/937422c3fc3d774b2105';
        let rawData = [];
        let filteredData = [];
        let weekNumberChart, weekDayChart;

        // Função principal para carregar dados
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`Erro na requisição: ${response.status}`);
                }
                
                rawData = await response.json();
                filteredData = [...rawData];
                
                populateFilters();
                createCharts();
                generateInsights();
                showContent();
                
            } catch (error) {
                showError(`Erro ao carregar dados: ${error.message}`);
            }
        }

        // Função para popular os filtros
        function populateFilters() {
            const funcionarios = [...new Set(rawData.map(item => item.Funcionario))].sort();
            const meses = [...new Set(rawData.map(item => item.Mes))].sort();

            const funcionarioSelect = document.getElementById('funcionario-filter');
            const mesSelect = document.getElementById('mes-filter');

            funcionarios.forEach(func => {
                const option = document.createElement('option');
                option.value = func;
                option.textContent = func;
                funcionarioSelect.appendChild(option);
            });

            meses.forEach(mes => {
                const option = document.createElement('option');
                option.value = mes;
                option.textContent = mes.charAt(0).toUpperCase() + mes.slice(1);
                mesSelect.appendChild(option);
            });

            // Event listeners para filtros
            funcionarioSelect.addEventListener('change', applyFilters);
            mesSelect.addEventListener('change', applyFilters);
        }

        // Função para aplicar filtros
        function applyFilters() {
            const funcionarioFilter = document.getElementById('funcionario-filter').value;
            const mesFilter = document.getElementById('mes-filter').value;

            filteredData = rawData.filter(item => {
                return (!funcionarioFilter || item.Funcionario === funcionarioFilter) &&
                       (!mesFilter || item.Mes === mesFilter);
            });

            updateCharts();
            generateInsights();
        }

        // Função para criar gráficos
        function createCharts() {
            createWeekNumberChart();
            createWeekDayChart();
        }

        // Gráfico por número da semana
        function createWeekNumberChart() {
            const ctx = document.getElementById('weekNumberChart').getContext('2d');
            
            const weekData = processWeekNumberData(filteredData);
            
            weekNumberChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weekData.labels,
                    datasets: [{
                        label: 'Reimpressões',
                        data: weekData.data,
                        backgroundColor: '#e63946',
                        borderColor: '#212529',
                        borderWidth: 1,
                        borderRadius: 4,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#212529',
                            titleColor: '#ffffff',
                            bodyColor: '#ffffff',
                            borderColor: '#e63946',
                            borderWidth: 1,
                            cornerRadius: 8,
                            displayColors: false,
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#adb5bd',
                                lineWidth: 0.5
                            },
                            ticks: {
                                color: '#212529',
                                font: {
                                    size: 12,
                                    weight: '500'
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#212529',
                                font: {
                                    size: 12,
                                    weight: '500'
                                }
                            }
                        }
                    },
                    onHover: (event, elements) => {
                        event.native.target.style.cursor = elements.length > 0 ? 'pointer' : 'default';
                    }
                }
            });
        }

        // Gráfico por dia da semana
        function createWeekDayChart() {
            const ctx = document.getElementById('weekDayChart').getContext('2d');
            
            const dayData = processWeekDayData(filteredData);
            
            weekDayChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dayData.labels,
                    datasets: [{
                        label: 'Reimpressões',
                        data: dayData.data,
                        backgroundColor: '#adb5bd',
                        borderColor: '#212529',
                        borderWidth: 1,
                        borderRadius: 4,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#212529',
                            titleColor: '#ffffff',
                            bodyColor: '#ffffff',
                            borderColor: '#adb5bd',
                            borderWidth: 1,
                            cornerRadius: 8,
                            displayColors: false,
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#adb5bd',
                                lineWidth: 0.5
                            },
                            ticks: {
                                color: '#212529',
                                font: {
                                    size: 12,
                                    weight: '500'
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#212529',
                                font: {
                                    size: 12,
                                    weight: '500'
                                }
                            }
                        }
                    },
                    onHover: (event, elements) => {
                        event.native.target.style.cursor = elements.length > 0 ? 'pointer' : 'default';
                    }
                }
            });
        }

        // Processar dados por número da semana
        function processWeekNumberData(data) {
            const weekSums = {};
            
            data.forEach(item => {
                const week = item['N Semana'];
                weekSums[week] = (weekSums[week] || 0) + item.Descricao;
            });

            const labels = Object.keys(weekSums).sort((a, b) => a - b);
            const chartData = labels.map(week => weekSums[week]);

            return { labels: labels.map(w => `Semana ${w}`), data: chartData };
        }

        // Processar dados por dia da semana
        function processWeekDayData(data) {
            const dayOrder = ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
            const daySums = {};
            
            data.forEach(item => {
                const day = item.Semana.toLowerCase();
                daySums[day] = (daySums[day] || 0) + item.Descricao;
            });

            const labels = dayOrder.filter(day => daySums[day] !== undefined);
            const chartData = labels.map(day => daySums[day] || 0);

            return { 
                labels: labels.map(day => day.charAt(0).toUpperCase() + day.slice(1)), 
                data: chartData 
            };
        }

        // Atualizar gráficos
        function updateCharts() {
            const weekData = processWeekNumberData(filteredData);
            const dayData = processWeekDayData(filteredData);

            weekNumberChart.data.labels = weekData.labels;
            weekNumberChart.data.datasets[0].data = weekData.data;
            weekNumberChart.update('none');

            weekDayChart.data.labels = dayData.labels;
            weekDayChart.data.datasets[0].data = dayData.data;
            weekDayChart.update('none');
        }

        // Gerar insights
        function generateInsights() {
            const insights = [];
            
            if (filteredData.length === 0) {
                insights.push('Nenhum dado disponível para os filtros selecionados');
                const insightsContainer = document.getElementById('insights-content');
                insightsContainer.innerHTML = insights.map(insight => 
                    `<div class="insight-item">${insight}</div>`
                ).join('');
                return;
            }

            const totalReimpressoes = filteredData.reduce((sum, item) => sum + item.Descricao, 0);
            const funcionarios = [...new Set(filteredData.map(item => item.Funcionario))];
            
            // Performance por funcionário
            const funcionarioStats = {};
            filteredData.forEach(item => {
                funcionarioStats[item.Funcionario] = (funcionarioStats[item.Funcionario] || 0) + item.Descricao;
            });
            
            const topFuncionario = Object.keys(funcionarioStats).reduce((a, b) => 
                funcionarioStats[a] > funcionarioStats[b] ? a : b
            );

            // Dia da semana com mais reimpressões
            const dayStats = {};
            filteredData.forEach(item => {
                dayStats[item.Semana] = (dayStats[item.Semana] || 0) + item.Descricao;
            });
            
            const topDay = Object.keys(dayStats).length > 0 ? 
                Object.keys(dayStats).reduce((a, b) => dayStats[a] > dayStats[b] ? a : b) : 'N/A';

            // Número da semana com mais reimpressões
            const weekStats = {};
            filteredData.forEach(item => {
                weekStats[item['N Semana']] = (weekStats[item['N Semana']] || 0) + item.Descricao;
            });
            
            const topWeek = Object.keys(weekStats).length > 0 ? 
                Object.keys(weekStats).reduce((a, b) => weekStats[a] > weekStats[b] ? a : b) : 'N/A';

            const mediaRegistro = filteredData.length > 0 ? (totalReimpressoes / filteredData.length).toFixed(1) : '0';

            insights.push(`Total de ${totalReimpressoes} reimpressões analisadas em ${filteredData.length} registros`);
            insights.push(`${topFuncionario} lidera com ${funcionarioStats[topFuncionario]} reimpressões`);
            insights.push(`${topDay} é o dia com maior volume (${dayStats[topDay]} reimpressões)`);
            insights.push(`Semana ${topWeek} teve o pico de atividade (${weekStats[topWeek]} reimpressões)`);
            insights.push(`Média de ${mediaRegistro} reimpressões por registro`);

            const insightsContainer = document.getElementById('insights-content');
            insightsContainer.innerHTML = insights.map(insight => 
                `<div class="insight-item">${insight}</div>`
            ).join('');
        }

        // Funções do modal
        function openModal() {
            const modal = document.getElementById('statsModal');
            const modalStats = document.getElementById('modal-stats');
            
            const totalRegistros = filteredData.length;
            const totalReimpressoes = filteredData.reduce((sum, item) => sum + item.Descricao, 0);
            const funcionarios = [...new Set(filteredData.map(item => item.Funcionario))];
            const meses = [...new Set(filteredData.map(item => item.Mes))];
            
            // Calcular período
            const semanas = [...new Set(filteredData.map(item => item['N Semana']))].sort((a, b) => a - b);
            const periodoInicial = semanas.length > 0 ? `Semana ${semanas[0]}` : 'N/A';
            const periodoFinal = semanas.length > 0 ? `Semana ${semanas[semanas.length - 1]}` : 'N/A';
            
            const mediaRegistro = totalRegistros > 0 ? (totalReimpressoes / totalRegistros).toFixed(1) : '0';

            modalStats.innerHTML = `
                <div class="stat-row">
                    <span class="stat-label">Total de Registros:</span>
                    <span class="stat-value">${totalRegistros}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Período Analisado:</span>
                    <span class="stat-value">${periodoInicial} - ${periodoFinal}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total de Reimpressões:</span>
                    <span class="stat-value">${totalReimpressoes}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Funcionários Ativos:</span>
                    <span class="stat-value">${funcionarios.length}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Meses Analisados:</span>
                    <span class="stat-value">${meses.length}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Média por Registro:</span>
                    <span class="stat-value">${mediaRegistro}</span>
                </div>
            `;

            modal.classList.add('show');
        }

        function closeModal() {
            const modal = document.getElementById('statsModal');
            modal.classList.remove('show');
        }

        // Função para mostrar erro
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Função para mostrar conteúdo
        function showContent() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('statsModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Prevenir zoom duplo toque em iOS
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Inicializar quando a página carregar
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
